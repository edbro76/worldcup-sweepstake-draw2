<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cerro Gordo World Cup Sweepstake Live Draw</title>
<style>
body{
  font-family:Arial,sans-serif;
  background:#2b2b2b;
  margin:0;
  padding:20px;
}
.container{
  max-width:1200px;
  margin:auto;
}
h1{
  text-align:center;
  color:white;
}
h2{
  color:white;
}
.controls{
  text-align:center;
  margin:20px 0;
}
button{
  padding:12px 24px;
  margin:0 10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
}
#drawBtn{
  background:#1d4ed8;
  color:white;
}
#resetBtn{
  background:#ddd;
}
.wheels{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin:20px 0;
}
.wheel{
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 4px 10px rgba(0,0,0,.2);
  text-align:center;
  min-height:120px;
}
.wheel h3{
  margin-top:0;
  color:#666;
}
.value{
  font-size:28px;
  font-weight:bold;
  color:#0b3a75;
}
table{
  width:100%;
  border-collapse:collapse;
  background:white;
  box-shadow:0 4px 10px rgba(0,0,0,.2);
}
th,td{
  padding:10px;
  border:1px solid #ddd;
  text-align:left;
}
</style>
</head>
<body>
<div class="container">
<h1>Cerro Gordo World Cup Sweepstake Live Draw</h1>

<div class="controls">
<button id="drawBtn" onclick="drawNext()">Draw Next</button>
<button id="resetBtn" onclick="resetAll()">Reset</button>
</div>

<div class="wheels">
<div class="wheel"><h3>Player</h3><div class="value" id="playerWheel">—</div></div>
<div class="wheel"><h3>Pot A</h3><div class="value" id="potAWheel">—</div></div>
<div class="wheel"><h3>Pot B</h3><div class="value" id="potBWheel">—</div></div>
</div>

<h2>Draw Table (<span id="progress">0</span>/24 complete)</h2>
<table>
<thead>
<tr>
<th>#</th>
<th>Player</th>
<th>Pot A</th>
<th>Pot B</th>
</tr>
</thead>
<tbody id="resultsBody"></tbody>
</table>
</div>

<audio id="bgMusic" loop>
  <source src="themetune.mp3" type="audio/mpeg">
</audio>

<script>
const initialPlayers=[
  'Audrey','Ed','Liz','Andy','Carys','Mike','Steve B','Mary',
  'June','Ray','Ian M','Margaret M','Jean','Elaine','Trevor',
  'Sheila','Dave','Roy 1','Roy 2','Maria','Gill','Len','Fiona','Craig'
];

const potASeed=[
  'Argentina','Spain','France','England','Portugal','Brazil',
  'Netherlands','Belgium','Germany','Croatia','Morocco','Colombia',
  'Uruguay','Mexico','USA','Switzerland','Senegal','Japan',
  'Iran','South Korea','Australia','Austria','Norway','Canada'
];

const potBSeed=[
  'Paraguay','Algeria','Egypt','Ghana',"Cote d'Ivoire",
  'Saudi Arabia','Qatar','Tunisia','Turkey','Czech Republic',
  'Scotland','Sweden','South Africa','New Zealand','Panama',
  'Haiti','Curaçao','Cape Verde','Jordan','Uzbekistan',
  'Iraq','Ecuador','DR Congo','Bosnia & Herzegovina'
];

let players=[...initialPlayers];
let potA=[...potASeed];
let potB=[...potBSeed];
let count=0;
let drawing=false;
let musicStarted=false;

function randomItem(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function spin(id, arr, finalValue, callback){
  const el=document.getElementById(id);
  let ticks=0;

  const interval=setInterval(()=>{
    el.textContent=randomItem(arr);
    ticks++;

    if(ticks>=30){
      clearInterval(interval);
      el.textContent=finalValue;
      if(callback) callback();
    }
  },100);
}

function drawNext(){
  if(!players.length || drawing) return;

  document.getElementById('playerWheel').textContent='—';
  document.getElementById('potAWheel').textContent='—';
  document.getElementById('potBWheel').textContent='—';

  const music=document.getElementById('bgMusic');
  if(!musicStarted){
    music.play();
    musicStarted=true;
  }

  drawing=true;

  const selectedPlayer=randomItem(players);
  const selectedA=randomItem(potA);
  const selectedB=randomItem(potB);

  spin('playerWheel',players,selectedPlayer,()=>{
    spin('potAWheel',potA,selectedA,()=>{
      spin('potBWheel',potB,selectedB,()=>{
        players=players.filter(x=>x!==selectedPlayer);
        potA=potA.filter(x=>x!==selectedA);
        potB=potB.filter(x=>x!==selectedB);

        count++;

        const row = `<tr>
          <td>${count}</td>
          <td>${selectedPlayer}</td>
          <td>${selectedA}</td>
          <td>${selectedB}</td>
        </tr>`;

        document.getElementById('resultsBody')
          .insertAdjacentHTML('beforeend',row);

        document.getElementById('progress').textContent=count;
        drawing=false;
      });
    });
  });
}

function resetAll(){
  players=[...initialPlayers];
  potA=[...potASeed];
  potB=[...potBSeed];
  count=0;
  drawing=false;
  musicStarted=false;

  const music=document.getElementById('bgMusic');
  music.pause();
  music.currentTime=0;

  document.getElementById('resultsBody').innerHTML='';
  document.getElementById('progress').textContent='0';
  document.getElementById('playerWheel').textContent='—';
  document.getElementById('potAWheel').textContent='—';
  document.getElementById('potBWheel').textContent='—';
}
</script>
</body>
</html>
