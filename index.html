<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 World Cup Sweepstake Draw</title>
<style>
.wheel{border-radius:50%;aspect-ratio:1/1;display:flex;flex-direction:column;justify-content:center;align-items:center;background:radial-gradient(circle,#ffffff 0%,#dbeafe 70%,#93c5fd 100%);border:6px solid #1d4ed8;transition:transform 0.6s ease;}
.wheel.spin{transform:rotate(720deg);}
.copyBtn{background:#16a34a;color:#fff;} 
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;padding:20px}
.container{max-width:1200px;margin:auto}
h1{text-align:center;color:#123}
.controls{text-align:center;margin:20px 0}
button{padding:12px 24px;margin:0 10px;border:none;border-radius:10px;cursor:pointer;font-size:16px}
#drawBtn{background:#1d4ed8;color:white} #resetBtn{background:#ddd}
.wheels{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:20px 0}
.wheel{background:white;padding:30px;border-radius:20px;box-shadow:0 4px 10px rgba(0,0,0,.1);text-align:center;min-height:120px}
.wheel h3{margin-top:0;color:#666}.value{font-size:28px;font-weight:bold;color:#0b3a75}
table{width:100%;border-collapse:collapse;background:white;box-shadow:0 4px 10px rgba(0,0,0,.1)}
th,td{padding:10px;border:1px solid #ddd;text-align:left}
</style>
</head>
<body>
<div class="container">
<h1>2026 World Cup Sweepstake Draw</h1>
<div class="controls">
<button id="drawBtn" onclick="drawNext()">Draw Next</button>
<button id="resetBtn" onclick="resetAll()">Reset</button>
<button class="copyBtn" onclick="copyResults()">Copy Results</button>
</div>
<div class="wheels">
<div class="wheel"><h3>Player</h3><div class="value" id="playerWheel">—</div></div>
<div class="wheel"><h3>Pot A</h3><div class="value" id="potAWheel">—</div></div>
<div class="wheel"><h3>Pot B</h3><div class="value" id="potBWheel">—</div></div>
</div>
<h2>Draw Table (<span id="progress">0</span>/24 complete)</h2>
<table>
<thead><tr><th>#</th><th>Player</th><th>Pot A</th><th>Pot B</th></tr></thead>
<tbody id="resultsBody"></tbody>
</table>
</div>
<script>
const initialPlayers=['Audrey','Ed','Liz','Andy','Carys','Mike','Steve B','Mary','June','Ray','Ian M','Margaret M','Jean','Elaine','Trevor','Sheila','Dave','Roy 1','Roy 2','Maria','Gill','Len','Fiona','Craig'];
const potASeed=['Argentina','Spain','France','England','Portugal','Brazil','Netherlands','Belgium','Germany','Croatia','Morocco','Colombia','Uruguay','Mexico','USA','Switzerland','Senegal','Japan','Iran','South Korea','Australia','Austria','Norway','Canada'];
const potBSeed=['Paraguay','Algeria','Egypt','Ghana','Cote d\'Ivoire','Saudi Arabia','Qatar','Tunisia','Turkey','Czech Republic','Scotland','Sweden','South Africa','New Zealand','Panama','Haiti','Curaçao','Cape Verde','Jordan','Uzbekistan','Iraq','Ecuador','DR Congo','Bosnia & Herzegovina'];
let players=[...initialPlayers], potA=[...potASeed], potB=[...potBSeed], count=0;
function randomItem(arr){return arr[Math.floor(Math.random()*arr.length)]}
function playTick(){const ctx=new (window.AudioContext||window.webkitAudioContext)(); const o=ctx.createOscillator(); const g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value=800; g.gain.value=0.03; o.start(); o.stop(ctx.currentTime+0.03)}
function spin(id, arr, finalValue, cb){let ticks=0; const el=document.getElementById(id); const int=setInterval(()=>{el.textContent=randomItem(arr); el.parentElement.classList.add('spin'); playTick(); ticks++;  if(ticks>15){clearInterval(int); el.parentElement.classList.remove('spin'); el.textContent=finalValue; cb&&cb();}},100)}
function drawNext(){if(!players.length)return; const p=randomItem(players), a=randomItem(potA), b=randomItem(potB);
spin('playerWheel',players,p,()=>{}); spin('potAWheel',potA,a,()=>{}); spin('potBWheel',potB,b,()=>{
players=players.filter(x=>x!==p); potA=potA.filter(x=>x!==a); potB=potB.filter(x=>x!==b); count++;
const row=`<tr><td>${count}</td><td>${p}</td><td>${a}</td><td>${b}</td></tr>`; document.getElementById('resultsBody').insertAdjacentHTML('beforeend',row); document.getElementById('progress').textContent=count;
});}
function copyResults(){
const rows=[...document.querySelectorAll('#resultsBody tr')].map(r=>[...r.children].map(td=>td.innerText).join(' | ')).join('
');
navigator.clipboard.writeText(rows); alert('Results copied to clipboard');
}
function resetAll(){players=[...initialPlayers]; potA=[...potASeed]; potB=[...potBSeed]; count=0; document.getElementById('resultsBody').innerHTML=''; document.getElementById('progress').textContent='0'; document.getElementById('playerWheel').textContent='—'; document.getElementById('potAWheel').textContent='—'; document.getElementById('potBWheel').textContent='—';}
</script>
</body>
</html>
