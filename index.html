<script>
const initialPlayers=['Audrey','Ed','Liz','Andy','Carys','Mike','Steve B','Mary','June','Ray','Ian M','Margaret M','Jean','Elaine','Trevor','Sheila','Dave','Roy 1','Roy 2','Maria','Gill','Len','Fiona','Craig'];
const potASeed=['Argentina','Spain','France','England','Portugal','Brazil','Netherlands','Belgium','Germany','Croatia','Morocco','Colombia','Uruguay','Mexico','USA','Switzerland','Senegal','Japan','Iran','South Korea','Australia','Austria','Norway','Canada'];
const potBSeed=['Paraguay','Algeria','Egypt','Ghana','Cote d\'Ivoire','Saudi Arabia','Qatar','Tunisia','Turkey','Czech Republic','Scotland','Sweden','South Africa','New Zealand','Panama','Haiti','Curaçao','Cape Verde','Jordan','Uzbekistan','Iraq','Ecuador','DR Congo','Bosnia & Herzegovina'];

let players=[...initialPlayers], potA=[...potASeed], potB=[...potBSeed], count=0;

function randomItem(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function drumRoll(duration=5000){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  let interval=setInterval(()=>{
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.frequency.value=120;
    gain.gain.value=0.04;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime+0.08);
  },120);
  setTimeout(()=>clearInterval(interval),duration);
}

function spin(id, arr, finalValue, cb){
  let ticks=0;
  const el=document.getElementById(id);
  drumRoll(5000);
  const int=setInterval(()=>{
    el.textContent=randomItem(arr);
    ticks++;
    if(ticks>=50){
      clearInterval(int);
      el.textContent=finalValue;
      cb&&cb();
    }
  },100);
}

function drawNext(){
  if(!players.length)return;

  const p=randomItem(players);
  const a=randomItem(potA);
  const b=randomItem(potB);

  spin('playerWheel',players,p,()=>{
    spin('potAWheel',potA,a,()=>{
      spin('potBWheel',potB,b,()=>{
        players=players.filter(x=>x!==p);
        potA=potA.filter(x=>x!==a);
        potB=potB.filter(x=>x!==b);
        count++;

        const row=`<tr><td>${count}</td><td>${p}</td><td>${a}</td><td>${b}</td></tr>`;
        document.getElementById('resultsBody').insertAdjacentHTML('beforeend',row);
        document.getElementById('progress').textContent=count;
      });
    });
  });
}

function resetAll(){
  players=[...initialPlayers];
  potA=[...potASeed];
  potB=[...potBSeed];
  count=0;
  document.getElementById('resultsBody').innerHTML='';
  document.getElementById('progress').textContent='0';
  document.getElementById('playerWheel').textContent='—';
  document.getElementById('potAWheel').textContent='—';
  document.getElementById('potBWheel').textContent='—';
}
</script>
